<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Darshit Gadhiya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#11393E;          /* deep peacock */
  --accent:#C5A059;       /* antique gold */
  --accent2:#E3C98F;
  --soft:#FAF6EE;         /* champagne paper */
  --soft2:#FFFDF8;
  --card:#FFFFFF;
  --line:rgba(17,57,62,.12);
  --text:#1F2D2A;
  --muted:#74807A;
  --ok:#16a34a;--err:#dc2626;--hi:#2563eb;
  --ease:cubic-bezier(.16,1,.3,1);
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'Mulish',sans-serif;background:var(--soft);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── animated ambient background ── */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.12;animation:float 22s var(--ease) infinite}
.orb1{width:340px;height:340px;background:var(--accent);top:-80px;left:-60px;animation-delay:0s}
.orb2{width:300px;height:300px;background:var(--ink);bottom:-60px;right:-40px;animation-delay:-6s}
.orb3{width:240px;height:240px;background:var(--accent2);top:40%;right:20%;animation-delay:-12s;opacity:.12}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,40px) scale(.95)}}

/* ── ADMIN BAR ── */
#abar{position:sticky;top:0;z-index:800;height:0;overflow:hidden;background:var(--ink);display:flex;align-items:center;gap:8px;padding:0 clamp(12px,4vw,30px);transition:height .35s var(--ease);box-shadow:0 4px 30px rgba(0,0,0,.3)}
#abar.on{height:54px;overflow:visible}
.ab-badge{background:var(--accent);color:#0c1a16;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:4px 11px;border-radius:100px;white-space:nowrap}
.ab-hint{color:rgba(255,255,255,.35);font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab-sep{width:1px;height:18px;background:rgba(255,255,255,.12)}
.abb{height:34px;padding:0 15px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:'Mulish',sans-serif;letter-spacing:.3px;transition:opacity .15s,transform .1s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.abb:active{transform:scale(.96)}
.abb-save{background:var(--ok);color:#fff}.abb-theme{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.abb-add{background:var(--hi);color:#fff}.abb-track{background:rgba(193,154,75,.18);color:var(--accent2);border:1px solid rgba(193,154,75,.3)}
.abb-exit{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}
.abb:hover{opacity:.85}

/* ── SHELL ── */
.shell{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:clamp(16px,4vw,40px) clamp(10px,3vw,20px)}
.sheet{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:0 30px 90px rgba(22,48,43,.16);position:relative}

/* ═══ SIGNATURE: engraved double-rule frame with corner diamonds ═══ */
.sheet-frame{position:absolute;inset:14px;border:1px solid var(--accent);opacity:.55;pointer-events:none;z-index:6;border-radius:14px;animation:frameIn 1.1s var(--ease) .1s both}
.sheet-frame::before{content:'';position:absolute;inset:5px;border:1px solid var(--accent);opacity:.45;border-radius:10px}
.sheet-frame i{position:absolute;width:7px;height:7px;background:var(--accent);transform:rotate(45deg)}
.sheet-frame i:nth-child(1){top:-4px;left:-4px}
.sheet-frame i:nth-child(2){top:-4px;right:-4px}
.sheet-frame i:nth-child(3){bottom:-4px;left:-4px}
.sheet-frame i:nth-child(4){bottom:-4px;right:-4px}
@keyframes frameIn{from{opacity:0;transform:scale(.99)}to{opacity:.55;transform:none}}
@media(max-width:600px){.sheet-frame{inset:8px;border-radius:10px}}

/* ── HERO ── */
.hero{padding:clamp(40px,7vw,72px) clamp(26px,6vw,64px) clamp(28px,4vw,42px);text-align:center;position:relative}
.hero-photo-wrap{
  width:clamp(120px,26vw,160px);height:clamp(120px,26vw,160px);
  margin:0 auto clamp(20px,3vw,28px);
  border-radius:50%;position:relative;
  cursor:zoom-in;
  opacity:0;transform:scale(.8);
  animation:popIn .9s var(--ease) .1s forwards;
}
.hero-photo-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:1.5px solid var(--accent);
  z-index:0;
}
.hero-photo-ring::before{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid var(--accent);opacity:.45}
.hero-photo{
  position:absolute;inset:0;width:100%;height:100%;
  border-radius:50%;object-fit:cover;object-position:top center;
  border:4px solid var(--card);z-index:1;
  background:var(--soft);
}
@keyframes popIn{to{opacity:1;transform:scale(1)}}
.hero-photo-edit{
  position:absolute;inset:0;border-radius:50%;z-index:2;
  background:rgba(22,48,43,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:#fff;font-size:11px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;
}
.hero-photo-wrap:hover .hero-photo-edit{opacity:1}

.hero-name{
  font-family:'Marcellus',serif;
  font-size:clamp(38px,8vw,68px);font-weight:500;
  color:var(--ink);line-height:1;letter-spacing:-1px;
  opacity:0;transform:translateY(20px);
  animation:up .8s var(--ease) .25s forwards;
}
.hero-name [contenteditable]{outline:none}
.h-ornament{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px}
.h-ornament::before,.h-ornament::after{content:'';height:1px;width:52px;background:linear-gradient(90deg,transparent,var(--accent))}
.h-ornament::after{transform:scaleX(-1)}
.h-ornament b{width:5px;height:5px;background:var(--accent);transform:rotate(45deg)}
.h-ornament b:nth-child(2){width:9px;height:9px}
body.lay-banner .h-ornament::before,body.lay-banner .h-ornament::after{background:linear-gradient(90deg,transparent,var(--accent2))}
body.lay-banner .h-ornament b,body.lay-split .h-ornament b{background:var(--accent2)}
body.lay-split .h-ornament,body.lay-banner .h-ornament,body.lay-portrait .h-ornament,body.lay-minimal .h-ornament,body.lay-magazine .h-ornament{justify-content:flex-start}
body.lay-minimal .h-ornament{display:none}
.hero-tag{
  margin-top:14px;display:inline-flex;flex-wrap:wrap;gap:8px;justify-content:center;
  opacity:0;transform:translateY(16px);
  animation:up .8s var(--ease) .4s forwards;
}
.tag{
  background:transparent;border:1px solid var(--accent);
  color:var(--ink);padding:6px 16px;border-radius:100px;
  font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;
  transition:all .2s;
}
.tag:hover{border-color:var(--accent);color:var(--ink)}
@keyframes up{to{opacity:1;transform:none}}

/* ── BODY ── */
.body{padding:0 clamp(24px,6vw,64px) clamp(36px,5vw,56px)}

/* ── SECTION ── */
.sec-block{position:relative;padding-top:clamp(30px,4.5vw,46px)}
.sec{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.sec.show{opacity:1;transform:none}
body.adm .sec-block{border-radius:14px;outline:2px dashed transparent;outline-offset:8px;transition:outline-color .2s}
body.adm .sec-block:hover{outline-color:rgba(37,99,235,.3)}
.sec-tools{display:none;position:absolute;top:clamp(22px,4vw,36px);right:-2px;z-index:60;background:var(--ink);border-radius:10px;padding:5px;gap:3px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
body.adm .sec-block:hover .sec-tools{display:flex}
.stb{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;background:transparent;color:rgba(255,255,255,.6);transition:background .15s}
.stb:hover{background:rgba(255,255,255,.12)}
.stb.danger:hover{background:rgba(220,38,38,.3);color:#f87171}

/* section heading */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-tt{
  font-family:'Marcellus',serif;font-size:clamp(17px,2.8vw,21px);font-weight:400;
  color:var(--ink);white-space:nowrap;outline:none;letter-spacing:.06em;text-transform:uppercase;
}
.sec-dot{width:7px;height:7px;background:var(--accent);transform:rotate(45deg);flex-shrink:0}
.sec-rule{flex:1;height:1px;background:var(--line);position:relative;overflow:hidden}
.sec-rule::after{content:'';position:absolute;left:0;top:0;height:100%;width:40px;background:linear-gradient(90deg,var(--accent),transparent);transform:translateX(-100%);transition:transform .8s var(--ease) .2s}
.sec.show .sec-rule::after{transform:translateX(0)}

/* ── INFO GRID ── */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
.cell{
  position:relative;grid-column:span 6;
  display:flex;align-items:baseline;gap:10px;
  padding:13px 4px;border-bottom:1px solid var(--line);
  transition:padding-left .25s;
}
.cell.w4{grid-column:span 4}.cell.w6{grid-column:span 6}.cell.w12{grid-column:span 12}
.cell:hover{padding-left:8px}
.cell-l{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);min-width:90px;flex-shrink:0;outline:none}
.cell-v{font-family:'Marcellus',serif;font-size:16px;font-weight:400;color:var(--ink);line-height:1.4;outline:none;flex:1;letter-spacing:.01em}
.cell-ctrls{display:none;position:absolute;top:4px;right:0;background:var(--ink);border-radius:7px;padding:3px;gap:2px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
body.adm .cell:hover .cell-ctrls{display:flex}
.ccb{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:transparent;color:rgba(255,255,255,.6);transition:background .15s;font-family:'Mulish',sans-serif}
.ccb:hover{background:rgba(255,255,255,.14)}.ccb.danger:hover{background:rgba(220,38,38,.3);color:#f87171}.ccb.active{background:rgba(193,154,75,.3);color:var(--accent2)}
.add-cell{display:none;grid-column:span 6;border:2px dashed rgba(37,99,235,.25);border-radius:10px;background:rgba(37,99,235,.04);min-height:52px;align-items:center;justify-content:center;cursor:pointer;color:var(--hi);font-size:12px;font-weight:600;transition:background .2s}
.add-cell:hover{background:rgba(37,99,235,.08)}
body.adm .add-cell{display:flex}

/* ── HOBBIES ── */
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{
  display:flex;align-items:center;gap:8px;
  background:var(--soft);border:1px solid var(--line);
  padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;color:var(--ink);
  transition:all .25s;cursor:default;position:relative;
}
.chip:hover{background:var(--ink);color:var(--accent2);transform:translateY(-2px)}
.chip-ico,.chip-lbl{outline:none}
.chip-del{display:none;position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:var(--err);color:#fff;font-size:12px;align-items:center;justify-content:center;cursor:pointer}
body.adm .chip-del{display:flex}
.add-chip{display:none;align-items:center;gap:7px;background:transparent;border:1.5px dashed rgba(0,0,0,.18);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Mulish',sans-serif;transition:all .2s}
.add-chip:hover{border-color:var(--ink);color:var(--ink)}
body.adm .add-chip{display:flex}

/* ── CONTACT ── */
.contacts{display:flex;gap:12px;flex-wrap:wrap}
.contact{
  display:flex;align-items:center;gap:11px;flex:1;min-width:200px;
  background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:14px 18px;
  transition:transform .2s,border-color .2s;position:relative;
}
.contact:hover{transform:translateY(-2px);border-color:var(--accent)}
.contact-ico{width:40px;height:40px;border-radius:11px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;outline:none}
.contact-main{font-size:14px;font-weight:600;color:var(--ink);outline:none;display:block}
.contact-sub{font-size:11px;color:var(--muted);outline:none;display:block;margin-top:1px}
.contact-del{display:none;position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:var(--err);color:#fff;font-size:12px;align-items:center;justify-content:center;cursor:pointer}
body.adm .contact-del{display:flex}
.add-contact{display:none;align-items:center;justify-content:center;gap:6px;min-width:160px;border:1.5px dashed rgba(0,0,0,.16);border-radius:14px;padding:14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Mulish',sans-serif;transition:all .2s}
.add-contact:hover{border-color:var(--hi);color:var(--hi)}
body.adm .add-contact{display:flex}

/* ── GALLERY ── */
.divider{height:1px;background:var(--line);margin:0 clamp(24px,6vw,64px)}
.gallery-zone{padding-top:clamp(30px,4.5vw,46px)}
.gallery-head{padding:0 clamp(24px,6vw,64px);display:flex;align-items:center;gap:12px;margin-bottom:18px}
.gallery-grid{display:grid;gap:6px;padding:0 clamp(16px,4vw,40px) clamp(20px,4vw,40px)}
.gcell{position:relative;width:100%;height:380px;background:var(--ink);border-radius:14px;overflow:hidden}
.gcell img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;display:block;transition:transform .6s var(--ease)}
.gcell:hover img{transform:scale(1.04)}
.gcell-label{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:18px;background:linear-gradient(transparent,rgba(0,0,0,.6));display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
.gcell-tag{color:var(--accent2);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;outline:none}
.gcell-name{color:rgba(255,255,255,.6);font-size:12px;font-family:'Marcellus',serif;font-style:italic;outline:none}
.gcell-upl{position:absolute;inset:0;z-index:3;background:rgba(22,48,43,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#fff;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;cursor:pointer}
.gcell-upl-ico{font-size:40px}
body.adm .gcell:hover .gcell-upl{opacity:1}
body.adm .gcell{cursor:pointer}
body.adm .gcell:hover img{transform:none}
.gcell-del{display:none;position:absolute;top:10px;right:10px;z-index:10;width:30px;height:30px;border-radius:50%;background:rgba(220,38,38,.88);color:#fff;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
body.adm .gcell-del{display:flex}
.add-gcell{display:none;height:380px;border-radius:14px;background:rgba(37,99,235,.04);border:2px dashed rgba(37,99,235,.25);flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--hi);font-size:14px;font-weight:600;transition:background .2s}
.add-gcell:hover{background:rgba(37,99,235,.08)}
.add-gcell-ico{font-size:42px}
body.adm .add-gcell{display:flex}
.gcols{display:none;padding:0 clamp(24px,6vw,64px) clamp(16px,3vw,24px);align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--muted)}
body.adm .gcols{display:flex}
.gcol-b{padding:4px 13px;border-radius:7px;border:1.5px solid var(--line);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);font-family:'Mulish',sans-serif;transition:all .2s}
.gcol-b.on{background:var(--ink);color:var(--accent2);border-color:var(--ink)}

/* add section btn */
.add-sec{display:none;width:100%;margin-top:10px;padding:11px;border-radius:11px;border:2px dashed rgba(37,99,235,.22);background:transparent;color:var(--hi);font-size:12px;font-weight:600;cursor:pointer;font-family:'Mulish',sans-serif;transition:all .2s}
.add-sec:hover{background:rgba(37,99,235,.06)}
body.adm .add-sec{display:block}

/* editable */
body.adm [contenteditable=true]{border-bottom:2px dashed rgba(193,154,75,.5);outline:none;cursor:text;border-radius:3px;padding:0 3px;min-width:24px;display:inline-block;transition:background .2s}
body.adm [contenteditable=true]:hover{background:rgba(193,154,75,.08)}
body.adm [contenteditable=true]:focus{background:rgba(193,154,75,.14);border-color:var(--accent)}

/* ── LIGHTBOX ── */
#lb{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
#lb.on{opacity:1;pointer-events:all}
#lbimg{max-width:100vw;max-height:100dvh;width:auto;height:auto;object-fit:contain;transform:scale(.92);transition:transform .4s var(--ease)}
#lb.on #lbimg{transform:scale(1)}
#lbx{position:fixed;top:14px;right:14px;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.22);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9001;transition:background .2s}
#lbx:hover{background:rgba(255,255,255,.22)}

/* ── FAB ── */
#fab{position:fixed;bottom:20px;right:20px;z-index:700;width:48px;height:48px;border-radius:50%;background:var(--ink);border:2px solid var(--accent);color:var(--accent);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.3);transition:transform .2s}
#fab:hover{transform:scale(1.1) rotate(45deg)}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;right:20px;z-index:9000;background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;transform:translateY(14px);opacity:0;transition:all .3s var(--ease);pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;max-width:260px}
#toast.on{transform:none;opacity:1}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0}.tdot.err{background:var(--err)}

/* ── MODALS ── */
.mov{position:fixed;inset:0;z-index:8900;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.mov.on{opacity:1;pointer-events:all}
.mbx{background:var(--card);border-radius:20px;padding:clamp(24px,5vw,38px);width:min(440px,100%);box-shadow:0 40px 100px rgba(0,0,0,.22);transform:translateY(16px) scale(.98);transition:transform .3s var(--ease);max-height:90vh;overflow-y:auto}
.mbx.wide{width:min(600px,100%)}
.mov.on .mbx{transform:none}
.mh{font-family:'Marcellus',serif;font-size:24px;font-weight:500;color:var(--ink);margin-bottom:5px}
.ms{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.5}
.mrow{margin-bottom:15px}
.mlb{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.minp,.msel{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Mulish',sans-serif;outline:none;transition:border-color .2s;color:var(--text);background:var(--card)}
.minp:focus{border-color:var(--accent)}
.mbtn{width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Mulish',sans-serif;transition:opacity .15s,transform .1s;margin-top:8px}
.mbtn:active{transform:scale(.98)}
.mbtn-p{background:var(--ink);color:var(--accent2)}.mbtn-p:hover{opacity:.88}
.mbtn-o{background:transparent;border:1.5px solid var(--line);color:var(--muted)}.mbtn-o:hover{border-color:var(--ink);color:var(--ink)}
.merr{color:var(--err);font-size:12px;margin-bottom:12px;display:none;padding:10px 14px;background:rgba(220,38,38,.07);border-radius:8px}
.merr.on{display:block}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin:16px 0}
.titem{border-radius:12px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;transition:all .2s}
.titem:hover{transform:scale(1.04)}.titem.on{border-color:var(--hi)}
.tsw{height:44px;display:grid;grid-template-columns:1fr 1fr}
.tnm{font-size:11px;font-weight:600;te
